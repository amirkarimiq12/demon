<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMON TIME | محاسبه‌گر سرعت</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-green: #003b00;
            --deep-black: #0a0a0a;
            --soft-black: #1a1a1a;
        }

        body {
            background-color: var(--deep-black);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* پس‌زمینه متحرک ظریف */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .card {
            background-color: var(--soft-black);
            border: 2px solid var(--dark-green);
            border-radius: 15px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center;
        }

        h1 {
            color: var(--neon-green);
            letter-spacing: 5px;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px var(--dark-green);
            font-size: 2rem;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            direction: ltr; /* برای نمایش درست ساعت:دقیقه:ثانیه */
            margin-bottom: 1.5rem;
        }

        .time-input {
            width: 60px;
            height: 50px;
            background: #000;
            border: 1px solid var(--dark-green);
            color: var(--neon-green);
            font-size: 1.2rem;
            text-align: center;
            border-radius: 8px;
            outline: none;
        }

        .time-input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
        }

        .separator {
            color: var(--neon-green);
            font-weight: bold;
            font-size: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #888;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #000;
            color: var(--neon-green);
            border: 1px solid var(--dark-green);
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            margin-bottom: 2rem;
        }

        .result-area {
            border-top: 1px solid var(--dark-green);
            padding-top: 1.5rem;
        }

        .result-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        #finalTime {
            font-size: 2.5rem;
            color: var(--neon-green);
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.5);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>DEMON TIME</h1>
    
    <label>زمان اصلی ویدیو</label>
    <div class="input-group">
        <input type="number" id="hh" class="time-input" placeholder="00" min="0" max="99">
        <span class="separator">:</span>
        <input type="number" id="mm" class="time-input" placeholder="00" min="0" max="59">
        <span class="separator">:</span>
        <input type="number" id="ss" class="time-input" placeholder="00" min="0" max="59">
    </div>

    <label>سرعت را انتخاب کنید</label>
    <select id="speedRange">
        <!-- سرعت‌ها از 1 تا 3.5 به صورت خودکار توسط JS ساخته می‌شوند -->
    </select>

    <div class="result-area">
        <div class="result-label">زمان تماشا پس از اعمال سرعت</div>
        <div id="finalTime">00:00:00</div>
    </div>
</div>

<script>
    const speedSelect = document.getElementById('speedRange');
    const hhIn = document.getElementById('hh');
    const mmIn = document.getElementById('mm');
    const ssIn = document.getElementById('ss');
    const finalDisplay = document.getElementById('finalTime');

    // ساخت لیست سرعت‌ها از 1x تا 3.5x
    for (let i = 1; i <= 3.5; i += 0.25) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + 'x Speed';
        if(i === 1) opt.selected = true;
        speedSelect.appendChild(opt);
    }

    // جابجایی خودکار بین باکس‌ها وقتی کاربر عدد وارد می‌کند
    const inputs = [hhIn, mmIn, ssIn];
    inputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            if (input.value.length >= 2 && index < 2) {
                inputs[index + 1].focus();
            }
            calculate();
        });
    });

    speedSelect.addEventListener('change', calculate);

    function calculate() {
        const h = parseInt(hhIn.value) || 0;
        const m = parseInt(mmIn.value) || 0;
        const s = parseInt(ssIn.value) || 0;
        const speed = parseFloat(speedSelect.value);

        const totalSeconds = (h * 3600) + (m * 60) + s;
        
        if (totalSeconds === 0) {
            finalDisplay.innerText = "00:00:00";
            return;
        }

        const resultSeconds = Math.floor(totalSeconds / speed);

        const resH = Math.floor(resultSeconds / 3600);
        const resM = Math.floor((resultSeconds % 3600) / 60);
        const resS = resultSeconds % 60;

        finalDisplay.innerText = 
            String(resH).padStart(2, '0') + ":" +
            String(resM).padStart(2, '0') + ":" +
            String(resS).padStart(2, '0');
    }
</script>

</body>
</html>
