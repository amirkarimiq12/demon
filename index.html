<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DemonQ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}

body{
    background:#0f0f13;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

.container{
    max-width:700px;
    padding:30px;
}

.logo{
    font-size:4rem;
    font-weight:bold;
    color:#8b5cf6;
    margin-bottom:20px;
    letter-spacing:2px;
}

h1{
    font-size:2rem;
    margin-bottom:15px;
}

p{
    color:#b0b0b0;
    line-height:1.8;
    margin-bottom:30px;
}

.loader{
    width:60px;
    height:60px;
    border:5px solid rgba(139,92,246,0.2);
    border-top:5px solid #8b5cf6;
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.footer{
    margin-top:40px;
    color:#666;
    font-size:0.9rem;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">DemonQ</div>

    <h1>🚧 سایت در حال ساخت است</h1>

    <p>
        در حال توسعه و آماده‌سازی وب‌سایت هستیم.
        به زودی با امکانات و محتوای جدید بازخواهیم گشت.
    </p>

    <div class="loader"></div>

    <div class="footer">
        © 2026 DemonQ.ir
    </div>
</div>

</body>
</html>
